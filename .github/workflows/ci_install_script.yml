name: CI Install Script

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
      - id: filter
        uses: ./.github/actions/relevant-changes
        with:
          base-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          paths: |
            docs/public/install.sh
            xtask/src/command/dist.rs
            .github/workflows/release_cli_vscode.yml
            .github/actions/relevant-changes/**
            .github/workflows/ci_install_script.yml

  test-install-script:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    name: Test install.sh (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            exe_name: tombi
          - os: macos-latest
            exe_name: tombi
          - os: windows-latest
            exe_name: tombi.exe
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Add install directory to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run install script
        run: |
          chmod +x ./docs/public/install.sh
          ./docs/public/install.sh

      - name: Verify tombi binary exists
        run: |
          test -f "$HOME/.local/bin/${{ matrix.exe_name }}"
          echo "Binary found at $HOME/.local/bin/${{ matrix.exe_name }}"

      - name: Verify tombi command works
        run: |
          ${{ matrix.exe_name }} --version
          ${{ matrix.exe_name }} --help

  test-install-script-tar-gz:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    name: Test install.sh tar.gz (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            exe_name: tombi
          - os: macos-latest
            exe_name: tombi
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Add install directory to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Prepare mock tar.gz release
        run: |
          VERSION="0.9.23-rc.1"
          OS="$(uname -s)"
          ARCH="$(uname -m)"

          case "${OS}" in
          Linux)
            OS="unknown-linux"
            if [ "${ARCH}" = "aarch64" ]; then
              ARCH="aarch64"
              TARGET="${ARCH}-${OS}-musl"
            elif [ "${ARCH}" = "armv7l" ]; then
              ARCH="arm"
              TARGET="${ARCH}-${OS}-gnueabihf"
            else
              ARCH="x86_64"
              TARGET="${ARCH}-${OS}-musl"
            fi
            ;;
          Darwin)
            OS="apple-darwin"
            if [ "${ARCH}" = "arm64" ]; then
              ARCH="aarch64"
            else
              ARCH="x86_64"
            fi
            TARGET="${ARCH}-${OS}"
            ;;
          *)
            echo "Unsupported OS: ${OS}"
            exit 1
            ;;
          esac

          RELEASE_ROOT="${RUNNER_TEMP}/mock-releases"
          RELEASE_DIR="${RELEASE_ROOT}/v${VERSION}"
          ARTIFACT_DIR="tombi-cli-${VERSION}-${TARGET}"
          mkdir -p "${RELEASE_DIR}/${ARTIFACT_DIR}"

          {
            echo '#!/bin/sh'
            echo 'case "$1" in'
            echo '  --version) echo "tombi 0.9.23-rc.1" ;;'
            echo '  --help) echo "mock help" ;;'
            echo '  *) echo "mock tombi" ;;'
            echo 'esac'
          } > "${RELEASE_DIR}/${ARTIFACT_DIR}/tombi"
          chmod +x "${RELEASE_DIR}/${ARTIFACT_DIR}/tombi"

          tar -czf "${RELEASE_DIR}/${ARTIFACT_DIR}.tar.gz" -C "${RELEASE_DIR}" "${ARTIFACT_DIR}"

          echo "TOMBI_RELEASE_BASE_URL=file://${RELEASE_ROOT}" >> $GITHUB_ENV
          echo "TOMBI_TEST_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Run install script with mock tar.gz release
        run: |
          chmod +x ./docs/public/install.sh
          ./docs/public/install.sh --version "${TOMBI_TEST_VERSION}"

      - name: Verify tombi binary exists
        run: |
          test -f "$HOME/.local/bin/${{ matrix.exe_name }}"
          echo "Binary found at $HOME/.local/bin/${{ matrix.exe_name }}"

      - name: Verify tombi command works
        run: |
          ${{ matrix.exe_name }} --version
          ${{ matrix.exe_name }} --help
