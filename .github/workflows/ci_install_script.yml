name: CI Install Script

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
      - id: filter
        uses: ./.github/actions/relevant-changes
        with:
          base-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          paths: |
            docs/public/install.sh
            .github/actions/relevant-changes/**
            .github/workflows/ci_install_script.yml

  test-install-script:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    name: Test install.sh (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            exe_name: tombi
          - os: macos-latest
            exe_name: tombi
          - os: windows-latest
            exe_name: tombi.exe
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Add install directory to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run install script
        run: |
          chmod +x ./docs/public/install.sh
          ./docs/public/install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tombi binary exists
        run: |
          test -f "$HOME/.local/bin/${{ matrix.exe_name }}"
          echo "Binary found at $HOME/.local/bin/${{ matrix.exe_name }}"

      - name: Verify tombi command works
        run: |
          ${{ matrix.exe_name }} --version
          ${{ matrix.exe_name }} --help
