name: CI IntelliJ Plugin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - id: filter
        uses: ./.github/actions/relevant-changes
        with:
          base-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          paths: |
            editors/intellij/**
            .github/actions/relevant-changes/**
            .github/workflows/ci_intellij_plugin.yml

  build-intellij-plugin:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Fetch sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: zulu
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Build plugin
        working-directory: ./editors/intellij
        run: |
          ./gradlew buildPlugin
      - name: Prepare plugin artifact
        id: artifact
        shell: bash
        working-directory: ./editors/intellij
        run: |
          cd build/distributions
          FILENAME=`ls *.zip`
          unzip "$FILENAME" -d content

          echo "filename=${FILENAME:0:-4}" >> $GITHUB_OUTPUT
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.artifact.outputs.filename }}
          path: ./editors/intellij/build/distributions/content/*/*

  test-intellij-plugin:
    needs: [build-intellij-plugin]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Fetch sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: zulu
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-read-only: true
      - name: Set up Tombi
        uses: tombi-toml/setup-tombi@df24458044353545055a12fe0d0742df9d3c5bea # v1
      - name: Run tests
        working-directory: ./editors/intellij
        run: |
          ./gradlew check
      - name: Upload result
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tests-result
          path: ${{ github.workspace }}/editors/intellij/build/reports/tests

  inspect-intellij-plugin:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          large-packages: false
      - name: Fetch sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: zulu
          java-version: 21
      - name: Run Qodana
        uses: JetBrains/qodana-action@99ec27a55aaaf5ba2fd7e5816e66231caed7a72a # v2025.2
        with:
          args: --project-dir,editors/intellij
          cache-default-branch-only: true

  verify-intellij-plugin:
    needs: [build-intellij-plugin]
    runs-on: ubuntu-latest

    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          large-packages: false
      - name: Fetch sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: zulu
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-read-only: true
      - name: Run verifier
        continue-on-error: true
        working-directory: ./editors/intellij
        run: |
          ./gradlew verifyPlugin
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pluginVerifier-result
          path: ${{ github.workspace }}/editors/intellij/build/reports/pluginVerifier

  nightly-intellij-plugin:
    if: github.event_name != 'pull_request'
    needs: [build-intellij-plugin, test-intellij-plugin, verify-intellij-plugin]
    runs-on: ubuntu-latest
    environment: IntelliJ
    continue-on-error: true

    steps:
      - name: Fetch sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: zulu
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-read-only: true
      - name: Publish plugin to Nightly channel
        env:
          PUBLISH_TOKEN: ${{ secrets.INTELLIJ_PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.INTELLIJ_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.INTELLIJ_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.INTELLIJ_PRIVATE_KEY_PASSWORD }}
        working-directory: ./editors/intellij
        run: |
          sed -i -E \
            "s/(pluginVersion = [^[:space:]]+)/\\1-nightly.$(git rev-parse --short HEAD)/g" \
            gradle.properties

          NIGHTLY_VERSION=$(grep -oP '^pluginVersion = \K\S+' gradle.properties)

          ./gradlew publishPlugin -Pchannel=Nightly -PpluginVersion=${NIGHTLY_VERSION}

  check-intellij-plugin-success:
    needs:
      - detect-changes
      - build-intellij-plugin
      - test-intellij-plugin
    if: always()
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: |
          if [[ "${{ needs.detect-changes.outputs.relevant }}" != "true" ]]; then
            echo "No relevant IntelliJ changes."
            exit 0
          fi

          [[ "${{ needs.build-intellij-plugin.result }}" == "success" ]]
          [[ "${{ needs.test-intellij-plugin.result }}" == "success" ]]
          echo "success"
