name: CI Python

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
      - id: filter
        uses: ./.github/actions/relevant-changes
        with:
          base-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          paths: |
            .cargo/**
            .python-version
            .github/actions/relevant-changes/**
            Cargo.toml
            Cargo.lock
            pyproject.toml
            uv.lock
            crates/**
            extensions/**
            rust/**
            xtask/**
            schemas/**
            www.schemastore.org/**
            www.schemastore.tombi/**
            www.tombi.dev/**
            python/**
            tombi.toml
            type-test.toml
            .github/workflows/ci_python.yml

  ci-python:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv run --frozen ruff format --check
      - run: uv run --frozen ruff check --no-fix
      - run: uv run --frozen pytest
