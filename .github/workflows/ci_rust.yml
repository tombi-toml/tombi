name: CI Rust

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CI: 1
  RUSTUP_MAX_RETRIES: 10
  CARGO_PROFILE_TEST_DEBUG: 0
  TOMBI_CACHE_HOME: ${{ github.workspace }}/.cache/tombi

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - id: filter
        uses: ./.github/actions/relevant-changes
        with:
          base-sha: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.sha || github.sha }}
          paths: |
            .cargo/**
            .config/nextest.toml
            .github/actions/relevant-changes/**
            Cargo.toml
            Cargo.lock
            rust-toolchain.toml
            clippy.toml
            rustfmt.toml
            toml.ungram
            crates/**
            extensions/**
            rust/**
            editors/zed/**
            toml-test/**
            xtask/**
            schemas/**
            www.schemastore.org/**
            www.schemastore.tombi/**
            tombi.toml
            type-test.toml
            .github/workflows/ci_rust.yml

  ci-rust:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    env:
      TOMBI_HTTP_TIMEOUT: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Create Tombi cache directory
        run: mkdir -p "$TOMBI_CACHE_HOME"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.TOMBI_CACHE_HOME }}
          key: ${{ runner.os }}-tombi-cache
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@e616db6d3d80e86d787ef4a5373e3a4b74c50db2 # nextest
      - name: Build
        run: cargo build --verbose --locked
      - name: Run tests
        run: cargo nextest run --verbose --locked

  cargo-shear:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: cargo-bins/cargo-binstall@8aac5aa2bf0dfaa2863eccad9f43c68fe40e5ec8 # v1.14.1
      - run: cargo binstall --no-confirm cargo-shear
      - run: cargo shear
