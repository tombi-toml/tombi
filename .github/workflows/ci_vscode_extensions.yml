name: CI VSCode Extensions

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - id: filter
        uses: ./.github/actions/relevant-changes
        with:
          base-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          paths: |
            .node-version
            .npmrc
            .github/actions/relevant-changes/**
            biome.json
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            editors/vscode/**
            .github/workflows/ci_vscode_extensions.yml

  ci-vscode-extensions:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - run: pnpm install
      - name: Check Biome schema version
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const config = JSON.parse(fs.readFileSync("biome.json", "utf8"));
          const schema = config.$schema ?? "";
          const match = schema.match(/^https:\/\/biomejs\.dev\/schemas\/([^/]+)\/schema\.json$/);
          if (!match) {
            console.error(`Invalid Biome schema URL: ${schema}`);
            process.exit(1);
          }

          const biomePackage = JSON.parse(
            fs.readFileSync("node_modules/@biomejs/biome/package.json", "utf8"),
          );
          if (match[1] !== biomePackage.version) {
            console.error(
              `Biome schema version mismatch: biome.json uses ${match[1]}, but @biomejs/biome is ${biomePackage.version}`,
            );
            process.exit(1);
          }
          NODE
      - run: pnpm run build
        working-directory: ./editors/vscode
      - run: pnpm run format:check
        working-directory: ./editors/vscode
      - run: pnpm run lint:check
        working-directory: ./editors/vscode
      - run: pnpm run typecheck
        working-directory: ./editors/vscode
      - run: pnpm run test
        working-directory: ./editors/vscode
