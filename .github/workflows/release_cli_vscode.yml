name: Release CLI and VSCode Extension

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

env:
  TOMBI_VERSION: ""
  ASSETS: ""
  CC_aarch64-unknown-linux-gnu: aarch64-linux-gnu-gcc
  CC_arm_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
  CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
  CARGO_PROFILE_RELEASE_LTO: "fat"
  RUSTFLAGS: "-C strip=symbols"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
      - id: filter
        uses: ./.github/actions/relevant-changes
        with:
          base-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          paths: |
            .cargo/**
            .github/actions/relevant-changes/**
            .github/actions/set-version/**
            .node-version
            .npmrc
            Cargo.toml
            Cargo.lock
            rust-toolchain.toml
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            editors/vscode/**
            crates/**
            extensions/**
            rust/**
            xtask/**
            schemas/**
            www.schemastore.org/**
            www.schemastore.tombi/**
            tombi.toml
            type-test.toml
            .github/workflows/release_cli_vscode.yml

  delete-old-dev-artifacts:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            tombi-cli-0.0.0-*
            tombi-vscode-0.0.0-*

  release-cli-and-vscode:
    name: dist (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [delete-old-dev-artifacts]
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            vscode_target: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            vscode_target: linux-arm64
          - os: ubuntu-24.04
            target: arm-unknown-linux-gnueabihf
            vscode_target: linux-armhf
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            vscode_target: win32-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            vscode_target: win32-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            vscode_target: darwin-x64
          - os: macos-14
            target: aarch64-apple-darwin
            vscode_target: darwin-arm64
      fail-fast: false
    env:
      TOMBI_TARGET: ${{ matrix.target }}
      VSCODE_TARGET: ${{ matrix.vscode_target }}
      GITHUB_REF: ${{ (github.ref) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup update --no-self-update stable
          rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Update apt repositories
        if: matrix.target == 'arm-unknown-linux-gnueabihf'
        run: sudo apt-get update

      - name: Install ARM target toolchain
        if: matrix.target == 'arm-unknown-linux-gnueabihf'
        run: sudo apt-get install gcc-arm-linux-gnueabihf

      - run: pnpm install && pnpm run build
        working-directory: ./editors/vscode

      - run: which pnpm

      - uses: ./.github/actions/set-version

      - name: Rub xtask dist
        run: cargo xtask dist
        env:
          RUST_BACKTRACE: "1"

      # FIXME: pnpm cannot exec `cargo xtask dist` on windows.
      #        See https://github.com/matklad/xshell/issues/82
      - name: Package VSCode Extension for Windows
        if: matrix.os == 'windows-latest'
        run: npx vsce package --no-dependencies -o "../../dist/tombi-vscode-${{ env.TOMBI_VERSION }}-${{ matrix.vscode_target }}.vsix" --target ${{ matrix.vscode_target }}
        working-directory: ./editors/vscode

      - name: Publish VSCode Extension
        run: npx vsce publish --no-dependencies --pat ${{ secrets.VSCODE_MARKETPLACE_TOKEN }} --packagePath "../../dist/tombi-vscode-${{ env.TOMBI_VERSION }}-${{ matrix.vscode_target }}.vsix" --skip-duplicate
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ./editors/vscode

      - name: Publish OpenVSX Extension
        run: npx ovsx publish --no-dependencies --pat ${{ secrets.OPEN_VSX_ACCESS_TOKEN }} --packagePath "../../dist/tombi-vscode-${{ env.TOMBI_VERSION }}-${{ matrix.vscode_target }}.vsix" --skip-duplicate
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ./editors/vscode
        timeout-minutes: 5

      - name: Upload tombi-cli artifacts
        uses: actions/upload-artifact@v4
        if: matrix.os != 'windows-latest'
        with:
          name: tombi-cli-${{ env.TOMBI_VERSION }}-${{ matrix.target }}.tar.gz
          path: dist/tombi-cli-${{ env.TOMBI_VERSION }}-${{ matrix.target }}.tar.gz

      - name: Upload tombi-cli artifacts (Windows)
        uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest'
        with:
          name: tombi-cli-${{ env.TOMBI_VERSION }}-${{ matrix.target }}.zip
          path: dist/tombi-cli-${{ env.TOMBI_VERSION }}-${{ matrix.target }}.zip

      - name: Upload tombi-vscode artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tombi-vscode-${{ env.TOMBI_VERSION }}-${{ matrix.vscode_target }}.vsix
          path: dist/tombi-vscode-${{ env.TOMBI_VERSION }}-${{ matrix.vscode_target }}.vsix

  check-release-notes:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if release notes exist
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if gh release view "${{ github.ref_name }}" --json body -q ".body" | grep -q .; then
            echo "Release notes exist for tag ${{ github.ref_name }}"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "No release notes found for tag ${{ github.ref_name }}"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  release-notes:
    needs: [release-cli-and-vscode, check-release-notes]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/set-version
      - name: Download tombi-cli artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tombi-cli-${{ env.TOMBI_VERSION }}-*
          path: tombi-cli-artifacts

      - name: Download tombi-vscode artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tombi-vscode-${{ env.TOMBI_VERSION }}-*
          path: tombi-vscode-artifacts

      - name: Check Directory
        run: tree -L 3

      - name: Find CLI Assets
        id: find_cli_assets
        shell: bash
        run: |
          echo "ASSETS=$(find tombi-cli-artifacts tombi-vscode-artifacts -type f | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Check ASSETS
        run: |
          echo "ASSETS: '${{ env.ASSETS }}'"
          if [ -z "${{ env.ASSETS }}" ]; then
            echo "Error: ASSETS is empty. Aborting release."
            exit 1
          fi
          echo "ASSETS found successfully."

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: startsWith(github.ref, 'refs/tags/') && needs.check-release-notes.outputs.exists == 'false'
        run: |
          gh release create ${{ github.ref_name }} --generate-notes ${{ env.ASSETS }}

  update-install-script-version:
    needs: [release-notes]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Detect stable release tag
        id: stable-version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "${REF_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "stable_version=${REF_NAME#v}" >> "${GITHUB_OUTPUT}"
          else
            echo "Skipping install.sh update for non-stable tag: ${REF_NAME}"
            echo "stable_version=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create GitHub App token for main update
        id: app-token
        if: steps.stable-version.outputs.stable_version != ''
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.VERSION_UPDATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.VERSION_UPDATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
          permission-contents: write

      - uses: actions/checkout@v4
        if: steps.stable-version.outputs.stable_version != ''
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Decide whether install.sh should be updated
        id: should-update
        if: steps.stable-version.outputs.stable_version != ''
        shell: bash
        env:
          STABLE_VERSION: ${{ steps.stable-version.outputs.stable_version }}
        run: |
          set -euo pipefail
          semver_re='^[0-9]+\.[0-9]+\.[0-9]+$'
          current_version="$(
            sed -n 's/^LATEST_STABLE_VERSION="\([0-9]\+\.[0-9]\+\.[0-9]\+\)"$/\1/p' docs/public/install.sh
          )"

          if [ -z "${current_version}" ]; then
            echo "LATEST_STABLE_VERSION entry not found in docs/public/install.sh" >&2
            exit 1
          fi

          if ! [[ "${current_version}" =~ ${semver_re} ]]; then
            echo "LATEST_STABLE_VERSION must be a stable semver, got: ${current_version}" >&2
            exit 1
          fi

          if ! [[ "${STABLE_VERSION}" =~ ${semver_re} ]]; then
            echo "Stable tag version must be a stable semver, got: ${STABLE_VERSION}" >&2
            exit 1
          fi

          IFS=. read -r current_major current_minor current_patch <<EOF
          ${current_version}
          EOF
          IFS=. read -r stable_major stable_minor stable_patch <<EOF
          ${STABLE_VERSION}
          EOF

          should_update=false
          if [ "${stable_major}" -gt "${current_major}" ]; then
            should_update=true
          elif [ "${stable_major}" -eq "${current_major}" ] && [ "${stable_minor}" -gt "${current_minor}" ]; then
            should_update=true
          elif [ "${stable_major}" -eq "${current_major}" ] \
            && [ "${stable_minor}" -eq "${current_minor}" ] \
            && [ "${stable_patch}" -gt "${current_patch}" ]; then
            should_update=true
          fi

          echo "current_version=${current_version}" >> "${GITHUB_OUTPUT}"
          echo "should_update=${should_update}" >> "${GITHUB_OUTPUT}"

          if [ "${should_update}" != "true" ]; then
            echo "Skipping install.sh update because ${STABLE_VERSION} is not newer than ${current_version}."
          fi

      - name: Update embedded stable version
        if: steps.should-update.outputs.should_update == 'true'
        shell: bash
        env:
          STABLE_VERSION: ${{ steps.stable-version.outputs.stable_version }}
        run: |
          set -euo pipefail
          sed -i 's/^LATEST_STABLE_VERSION=.*/LATEST_STABLE_VERSION="'"${STABLE_VERSION}"'"/' docs/public/install.sh

          if ! grep -Fxq "LATEST_STABLE_VERSION=\"${STABLE_VERSION}\"" docs/public/install.sh; then
            echo "Failed to update embedded stable version to ${STABLE_VERSION}" >&2
            exit 1
          fi

      - name: Commit updated install script
        id: commit-install-script
        if: steps.should-update.outputs.should_update == 'true'
        shell: bash
        env:
          STABLE_VERSION: ${{ steps.stable-version.outputs.stable_version }}
        run: |
          set -euo pipefail
          if git diff --quiet -- docs/public/install.sh; then
            echo "created_commit=false" >> "${GITHUB_OUTPUT}"
            echo "install.sh is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/public/install.sh
          git commit -m "docs: update install.sh stable version to ${STABLE_VERSION}"
          echo "created_commit=true" >> "${GITHUB_OUTPUT}"

      - name: Push updated install script to main
        if: steps.commit-install-script.outputs.created_commit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              exit 0
            fi

            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to push updated install.sh to main after ${attempt} attempts." >&2
              exit 1
            fi
          done
