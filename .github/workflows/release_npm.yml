name: Release NPM Package
on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

env:
  TOMBI_VERSION: ""
  CC_aarch64-unknown-linux-gnu: aarch64-linux-gnu-gcc
  CC_arm_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
  CARGO_PROFILE_RELEASE_LTO: "fat"
  CARGO_PROFILE_RELEASE_STRIP: "symbols"
  GITHUB_REF: ${{ (github.ref) }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - id: filter
        uses: ./.github/actions/relevant-changes
        with:
          base-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          paths: |
            .cargo/**
            .github/actions/relevant-changes/**
            .github/actions/set-version/**
            .github/scripts/install-cross.sh
            Cargo.toml
            Cargo.lock
            rust-toolchain.toml
            crates/**
            extensions/**
            rust/**
            xtask/**
            schemas/**
            www.schemastore.org/**
            www.schemastore.tombi/**
            typescript/**
            tombi.toml
            type-test.toml
            .github/workflows/release_npm.yml

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            vscode_target: win32-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            vscode_target: win32-arm64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            vscode_target: linux-x64
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            vscode_target: linux-arm64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            vscode_target: linux-x64-musl
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            vscode_target: linux-arm64-musl
          - os: macos-14
            target: x86_64-apple-darwin
            vscode_target: darwin-x64
          - os: macos-14
            target: aarch64-apple-darwin
            vscode_target: darwin-arm64
          - os: ubuntu-24.04
            target: x86_64-unknown-illumos
            vscode_target: sunos-x64
            use_cross: true
      fail-fast: false
    name: Package ${{ matrix.vscode_target }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"

      - name: Install Rust toolchain
        if: ${{ !matrix.use_cross }}
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: .github/scripts/install-cross.sh

      - name: Install arm64 toolchain
        if: matrix.vscode_target == 'linux-arm64' || matrix.vscode_target == 'linux-arm64-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl toolchain
        if: matrix.vscode_target == 'linux-x64-musl' || matrix.vscode_target == 'linux-arm64-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Set jemalloc page size for linux-arm64
        if: matrix.vscode_target == 'linux-arm64'
        run: |
          echo "JEMALLOC_SYS_WITH_LG_PAGE=16" >> $GITHUB_ENV

      - uses: ./.github/actions/set-version

      # Build the CLI binary
      - name: Build binaries
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build -p tombi-cli --release --target ${{ matrix.target }}
        env:
          # Don't strip illumos binaries because stripping on a different platform
          # breaks illumos observability tooling such as pstack. See
          # https://github.com/oxidecomputer/helios/issues/147.
          CARGO_PROFILE_RELEASE_STRIP: ${{ matrix.target == 'x86_64-unknown-illumos' && 'none' || 'symbols' }}

      # Copy the CLI binary and rename it to include the name of the target platform
      - run: ls target
      - run: ls target/${{ matrix.target }}
      - run: ls target/${{ matrix.target }}/release
      - name: Copy CLI binary
        if: startsWith(matrix.os, 'windows') == true
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/tombi.exe ./dist/tombi-${{ matrix.vscode_target }}.exe
      - name: Copy CLI binary
        if: startsWith(matrix.os, 'windows') == false
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/tombi ./dist/tombi-${{ matrix.vscode_target }}

      # Upload the CLI binary as a build artifact
      - name: Upload CLI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-${{ matrix.target }}
          path: ./dist/tombi-*
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: tombi-release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download CLI artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: cli-*
          merge-multiple: true

      - uses: ./.github/actions/set-version
      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node 24 includes a compatible npm for trusted publishing.
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Generate npm package
        run: node typescript/@tombi-toml/tombi/scripts/generate-packages.mjs

      - name: Publish '@tombi-toml/*' npm packages
        run: |
          set -e
          for package in typescript/@tombi-toml/*; do
            package=${package#typescript/}
            if npm view ${package}@${TOMBI_VERSION} version > /dev/null 2>&1; then
              echo "${package}@${TOMBI_VERSION} is already published. Skipping publish."
              continue
            fi
            npm publish typescript/$package --tag latest --access public --provenance
            echo publish ${package}@${TOMBI_VERSION}
          done

      - name: Publish 'tombi' npm package
        run: |
          set -e
          # Check if tombi@${TOMBI_VERSION} is already published
          if npm view tombi@${TOMBI_VERSION} version > /dev/null 2>&1; then
            echo "tombi@${TOMBI_VERSION} is already published. Skipping publish."
          else
            # Create a temporary directory
            temp_dir=$(mktemp -d)

            # Copy @tombi-toml/tombi package (follow symlinks)
            cp -Lr typescript/@tombi-toml/tombi/* "$temp_dir/"

            # Update `package.json` to change the name from @tombi-toml/tombi to tombi
            cd "$temp_dir"
            jq '.name = "tombi"' package.json > package.json.tmp && mv package.json.tmp package.json

            # Publish as tombi
            npm publish --tag latest --access public --provenance
            echo "Published tombi@${TOMBI_VERSION}"

            # Clean up
            cd -
            rm -rf "$temp_dir"
          fi
