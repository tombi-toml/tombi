name: toml-test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
      - id: filter
        uses: ./.github/actions/relevant-changes
        with:
          base-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          paths: |
            .cargo/**
            .github/actions/relevant-changes/**
            Cargo.toml
            Cargo.lock
            rust-toolchain.toml
            crates/**
            extensions/**
            rust/**
            toml-test/**
            xtask/**
            schemas/**
            www.schemastore.org/**
            www.schemastore.tombi/**
            tombi.toml
            type-test.toml
            .github/workflows/toml-test.yml

  toml-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    name: Run toml-test (${{ matrix.toml-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toml-version:
          - v1.0.0
          - v1.1.0-preview
          - v1.1.0
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install toml-test
        run: go install github.com/toml-lang/toml-test/v2/cmd/toml-test@latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run toml-test
        run: cargo xtask toml-test --toml-version ${{ matrix.toml-version }}

  success-toml-test:
    needs:
      - detect-changes
      - toml-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: |
          if [[ "${{ needs.detect-changes.outputs.relevant }}" != "true" ]]; then
            echo "No relevant toml-test changes."
            exit 0
          fi

          [[ "${{ needs.toml-test.result }}" == "success" ]]
          echo "All matrix jobs succeeded!"
