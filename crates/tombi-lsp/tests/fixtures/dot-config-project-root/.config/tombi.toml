toml-version = "v1.1.0"

[files]
include = ["**/*.toml"]

[[schemas]]
path = "schemas/name.schema.json"
include = ["product.toml"]

[extensions]
"tombi-toml/tombi" = {
  lsp = {
    document-link = {
      # tombi: lint.rules.deprecated.disabled = true
      path = { enabled = true },
    },
    goto-definition.path.enabled = true,
  },
}
